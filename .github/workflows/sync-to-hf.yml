name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface-hub
        run: pip install huggingface-hub[cli] hf-transfer

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          from huggingface_hub import HfApi
          import os

          api = HfApi(token=os.environ["HF_TOKEN"])

          # Upload all files (add/update), delete files removed from GitHub
          api.upload_folder(
                folder_path=".",
                repo_id="rajvivan/ML-Sentiment-Analysis-Social-Media",
                repo_type="space",
                ignore_patterns=[".git/*", ".github/*", "__pycache__/*", "*.pyc"],
                delete_patterns=["*"],  # delete any HF file not present in GitHub
          )
          print("Sync complete!")
          EOF
