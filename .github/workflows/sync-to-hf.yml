name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "vizartpandey@users.noreply.github.com"
          git config --global user.name "VizArtPandey"
          git remote add hf https://rajvivan:${HF_TOKEN}@huggingface.co/spaces/rajvivan/ML-Sentiment-Analysis-Social-Media
          git push hf main --force
